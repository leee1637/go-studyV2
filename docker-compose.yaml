services:
  study-postgres:
    image: postgres:15-alpine
    container_name: study-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./out/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  study-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./migrations:/migrations
    command: -path /migrations -database "postgres://test:123@study-postgres:5432/test_db?sslmode=disable" up
    restart: "no"